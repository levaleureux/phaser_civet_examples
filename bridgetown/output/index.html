<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phaser Examples</title>
    <link rel="stylesheet" href="/assets/css/main.css?v=1759918662">
    <script type="module">let lastmod = 0
let reconnectAttempts = 0
function startLiveReload() {
  const connection = new EventSource("/_bridgetown/live_reload")

  connection.addEventListener("message", event => {
    reconnectAttempts = 0
    if (document.querySelector("#bridgetown-build-error")) document.querySelector("#bridgetown-build-error").close()
    if (event.data == "reloaded!") {
      location.reload()
    } else {
      const newmod = Number(event.data)
      if (lastmod > 0 && newmod > 0 && lastmod < newmod) {
        location.reload()
      } else {
        lastmod = newmod
      }
    }
  })

  connection.addEventListener("builderror", event => {
    let dialog = document.querySelector("#bridgetown-build-error")
    if (!dialog) {
      dialog = document.createElement("dialog")
      dialog.id = "bridgetown-build-error"
      dialog.style.borderColor = "red"
      dialog.style.fontSize = "110%"
      dialog.innerHTML = `
        <p style="color:red">There was an error when building the site:</p>
        <output><pre></pre></output>
        <p><small>Check your Bridgetown logs for further details.</small></p>
      `
      document.body.appendChild(dialog)
      dialog.showModal()
    }
    dialog.querySelector("pre").textContent = JSON.parse(event.data)
  })

  connection.addEventListener("error", () => {
    if (connection.readyState === 2) {
      // reconnect with new object
      connection.close()
      reconnectAttempts++
      if (reconnectAttempts < 25) {
        console.warn("Live reload: attempting to reconnect in 3 seconds...")
        setTimeout(() => startLiveReload(), 3000)
      } else {
        console.error("Too many live reload connections failed. Refresh the page to try again.")
      }
    }
  })
}

startLiveReload()
</script>
</head>
<body>
    <div class="copper-bg"></div>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo-container">
                    <div class="logo phaser">P</div>
                    <span style="color: #b4b4c8; font-size: 2rem;">+</span>
                    <div class="logo civet">C</div>
                </div>
                <h1 class="title">Phaser Examples</h1>
            </div>
        </div>
    </header>

    <main>
        <h1>Hello from Bridgetown with ERB!</h1>
<p>This is a test page using ERB templating and indented Sass.</p>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <a href="https://phaser.io" class="footer-link">Phaser.io</a>
                <a href="https://civet.dev" class="footer-link">Civet.dev</a>
                <a href="https://github.com/levaleureux/phaser_civet_examples" class="footer-link">GitHub</a>
            </div>
        </div>
    </footer>
</body>
</html>
