<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
    <div class="copper-bg"></div>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo-container">
                    <div class="logo phaser">P</div>
                    <span style="color: #b4b4c8; font-size: 2rem;">+</span>
                    <div class="logo civet">C</div>
                </div>
                <h1 class="title">{{ site.title }}</h1>
            </div>
        </div>
    </header>

    <main>
        <section class="examples-preview">
            <div class="container">
                <h2>{{ page.title }}</h2>
                <p class="examples-subtitle">
                    Examples in the {{ page.category }} category
                </p>
                 <div class="examples-grid">
                     {% for example in site.data.examples %}
                     {% if example.category == page.category %}
                     <div class="example-item">
                         <div class="category-image"></div>
                         <div class="category-content">
                             <h4><a href="/examples/{{ example.slug }}.html">{{ example.title }}</a></h4>
                             <p>Phaser example in CivetScript</p>
                         </div>
                     </div>
                     {% endif %}
                     {% endfor %}
                 </div>
                <div class="view-all-examples">
                    <a href="/">Back to Home</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <a href="https://phaser.io" class="footer-link">Phaser.io</a>
                <a href="https://civet.dev" class="footer-link">Civet.dev</a>
                <a href="https://github.com/levaleureux/phaser_civet_examples" class="footer-link">GitHub</a>
            </div>
        </div>
    </footer>
</body>
</html>
