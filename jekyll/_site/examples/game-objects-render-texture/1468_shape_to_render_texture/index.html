<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1468_shape_to_render_texture | Phaser Examples</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div class="copper-bg"></div>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo-container">
                    <div class="logo phaser">P</div>
                    <span style="color: #b4b4c8; font-size: 2rem;">+</span>
                    <div class="logo civet">C</div>
                </div>
                <h1 class="title">Phaser Examples</h1>
            </div>
        </div>
    </header>

    <main>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

<div class="example-container">
  <h1>Shape To Render Texture</h1>
  <div class="example-content">
    <div class="example-code">
      <h2>Code</h2>
      <pre id="code-display"><code class="language-js">// Loading code...</code></pre>
    </div>
    <div class="example-preview">
      <h2>Preview</h2>
      <div id="phaser-example"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.85.0/dist/phaser.min.js"></script>
<script src="/assets/examples/game-objects-render-texture/examples/1468_shape_to_render_texture/original.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  fetch('/assets/examples/game-objects-render-texture/examples/1468_shape_to_render_texture/original.js')
    .then(response => response.text())
    .then(code => {
      document.getElementById('code-display').innerHTML = `<code class="language-js">${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code>`;
      if (window.Prism) {
        Prism.highlightElement(document.querySelector('#code-display code'));
      }
    })
    .catch(err => {
      document.getElementById('code-display').innerHTML = '<code>Error loading code.</code>';
      console.error(err);
    });
});
</script>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <a href="https://phaser.io" class="footer-link">Phaser.io</a>
                <a href="https://civet.dev" class="footer-link">Civet.dev</a>
                <a href="https://github.com/levaleureux/phaser_civet_examples" class="footer-link">GitHub</a>
            </div>
        </div>
    </footer>
</body>
</html>
